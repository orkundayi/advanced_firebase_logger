name: advanced_firebase_logger
description: "An advanced Flutter package for logging to Firebase Cloud Firestore with multiple log levels, rich metadata support, and customizable features."
version: 0.2.0
homepage: https://github.com/orkundayi/advanced_firebase_logger
repository: https://github.com/orkundayi/advanced_firebase_logger

environment:
  sdk: ^3.8.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^6.2.0
  firebase_core: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
